<!DOCTYPE html>
<html lang="en" class="antialiased">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description"
    content="AuraDesk — A modern, elegant task manager built for Chartered Accountants. Manage tasks, deadlines, notes, and client work with a beautiful glass UI.">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self';">
  <meta name="theme-color" content="#efecea" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111113" media="(prefers-color-scheme: dark)">
  <title>AuraDesk - CA Task Manager</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="overflow-hidden fixed inset-0 w-full h-[100dvh]" style="color: var(--text-primary);">
  <div id="root" class="relative w-full h-full"></div>
  <script type="module" src="/index.tsx"></script>

  <!--
    AUTHENTIC LIQUID GLASS SVG FILTERS
    - Surface filters: refraction for cards, sidebar, tab bar
    - Modal filters: refraction + dimming for full-screen overlays
    backdrop-filter: url(#id) is Chromium-only.
    Safari/Firefox ignore it and keep the CSS blur fallback.
  -->
  <svg style="position:absolute;width:0;height:0;pointer-events:none;overflow:hidden" aria-hidden="true">
    <defs>
      <!-- PRIMARY: Cards, modals (volumetric-surface) — refraction + specular -->
      <filter id="liquid-glass-refract" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="3" seed="42" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="18" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="20" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="2.0" result="saturated" />
        <feSpecularLighting in="smoothNoise" surfaceScale="2" specularConstant="0.3" specularExponent="35"
          lighting-color="#ffffff" result="specular">
          <fePointLight x="200" y="-80" z="400" />
        </feSpecularLighting>
        <feComposite in="specular" in2="saturated" operator="in" result="specClipped" />
        <feBlend in="saturated" in2="specClipped" mode="screen" />
      </filter>

      <!-- PRIMARY DARK -->
      <filter id="liquid-glass-refract-dark" x="-10%" y="-10%" width="120%" height="120%"
        color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="3" seed="42" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="18" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="24" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="1.7" result="saturated" />
        <feColorMatrix in="saturated" type="matrix" values="0.92 0 0 0 0  0 0.92 0 0 0  0 0 0.92 0 0  0 0 0 1 0" />
      </filter>

      <!-- SUBTLE: Tab bar, tier-2/tier-3 cards -->
      <filter id="liquid-glass-subtle" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="2" seed="7" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="3" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="12" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="32" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="2.0" />
      </filter>

      <!-- SUBTLE DARK -->
      <filter id="liquid-glass-subtle-dark" x="-5%" y="-5%" width="110%" height="110%"
        color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="2" seed="7" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="3" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="12" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="32" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="1.6" result="saturated" />
        <feColorMatrix in="saturated" type="matrix" values="0.88 0 0 0 0  0 0.88 0 0 0  0 0 0.88 0 0  0 0 0 1 0" />
      </filter>

      <!-- LIVING: Sidebar (animated seed cycling) -->
      <filter id="liquid-glass-living" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.006" numOctaves="2" seed="1" result="noise">
          <animate attributeName="seed" from="1" to="100" dur="60s" repeatCount="indefinite" />
        </feTurbulence>
        <feGaussianBlur in="noise" stdDeviation="2.5" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="15" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="20" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="2.0" result="saturated" />
        <feSpecularLighting in="smoothNoise" surfaceScale="1.5" specularConstant="0.2" specularExponent="40"
          lighting-color="#ffffff" result="specular">
          <fePointLight x="150" y="-60" z="350" />
        </feSpecularLighting>
        <feComposite in="specular" in2="saturated" operator="in" result="specClipped" />
        <feBlend in="saturated" in2="specClipped" mode="screen" />
      </filter>

      <!-- LIVING DARK -->
      <filter id="liquid-glass-living-dark" x="-10%" y="-10%" width="120%" height="120%"
        color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.006" numOctaves="2" seed="1" result="noise">
          <animate attributeName="seed" from="1" to="100" dur="60s" repeatCount="indefinite" />
        </feTurbulence>
        <feGaussianBlur in="noise" stdDeviation="2.5" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="15" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="20" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="1.7" result="saturated" />
        <feColorMatrix in="saturated" type="matrix" values="0.92 0 0 0 0  0 0.92 0 0 0  0 0 0.92 0 0  0 0 0 1 0" />
      </filter>

      <!--
        MODAL OVERLAY: High-impact refraction + dimming + blur
        When a modal opens, the ENTIRE app is behind this overlay.
        That means lots of varied content (sidebar, cards, icons, text)
        to refract through — this is where liquid glass shines most.
        
        Higher displacement scale (22) for dramatic "looking through
        thick glass" effect. Brightness reduced to 0.7 for focus dimming.
      -->
      <filter id="liquid-glass-modal" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.006" numOctaves="3" seed="23" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="3" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="22" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="20" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="0.85" result="desat" />
        <!-- Dim to ~70% brightness for modal focus -->
        <feColorMatrix in="desat" type="matrix" values="0.7 0 0 0 0  0 0.7 0 0 0  0 0 0.7 0 0  0 0 0 1 0"
          result="dimmed" />
        <feSpecularLighting in="smoothNoise" surfaceScale="1" specularConstant="0.12" specularExponent="30"
          lighting-color="#ffffff" result="specular">
          <fePointLight x="300" y="-100" z="500" />
        </feSpecularLighting>
        <feComposite in="specular" in2="dimmed" operator="in" result="specClipped" />
        <feBlend in="dimmed" in2="specClipped" mode="screen" />
      </filter>

      <!-- MODAL OVERLAY DARK: Similar but darker dimming -->
      <filter id="liquid-glass-modal-dark" x="-10%" y="-10%" width="120%" height="120%"
        color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.006" numOctaves="3" seed="23" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="3" result="smoothNoise" />
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="22" xChannelSelector="R" yChannelSelector="G"
          result="refracted" />
        <feGaussianBlur in="refracted" stdDeviation="22" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="0.7" result="desat" />
        <feColorMatrix in="desat" type="matrix" values="0.55 0 0 0 0  0 0.55 0 0 0  0 0 0.55 0 0  0 0 0 1 0" />
      </filter>
    </defs>
  </svg>
</body>

</html>
